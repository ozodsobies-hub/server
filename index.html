<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boshqaruv Paneli</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    </style>
</head>
<body class="font-sans antialiased p-4 md:p-8">

    <!-- 1. LOGIN OYNASI -->
    <div id="login-box" class="max-w-md mx-auto mt-20 bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700">
        <h2 class="text-2xl font-bold text-center mb-6 text-indigo-400">Tizimga kirish</h2>
        <div class="space-y-4">
            <div>
                <label class="block text-sm mb-1 text-slate-300">Login</label>
                <input type="text" id="username" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white focus:outline-none focus:border-indigo-500">
            </div>
            <div>
                <label class="block text-sm mb-1 text-slate-300">Parol</label>
                <input type="password" id="password" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white focus:outline-none focus:border-indigo-500">
            </div>
            <p id="login-error" class="text-red-500 text-sm hidden">Login yoki parol noto'g'ri!</p>
            <button onclick="checkLogin()" class="w-full bg-indigo-600 hover:bg-indigo-700 font-medium rounded-lg p-2.5 transition text-white">Kirish</button>
        </div>
    </div>

    <!-- 2. ASOSIY PANEL (KIRGANDAN SO'NG KO'RINADI) -->
    <div id="main-panel" class="hidden max-w-6xl mx-auto space-y-6">
        <header class="flex justify-between items-center bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-lg">
            <h1 class="text-xl font-bold text-indigo-400">Admin Panel: <span class="text-white font-normal">shadows</span></h1>
            <button onclick="logout()" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg text-sm transition font-medium">Chiqish</button>
        </header>

        <!-- Stollar bo'limi -->
        <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-semibold text-slate-300">Stollar holati (300 ta joy)</h2>
                <span class="text-xs bg-slate-900 text-slate-400 px-3 py-1 rounded-full border border-slate-700">Yashil = Bo'sh | Qizil = Band</span>
            </div>
            <div class="grid grid-cols-6 sm:grid-cols-10 md:grid-cols-12 lg:grid-cols-15 gap-2 max-h-[350px] overflow-y-auto p-3 bg-slate-900 rounded-lg border border-slate-800" id="stollar-container">
                <!-- Stollar JS orqali avtomat chiziladi -->
            </div>
        </div>

        <!-- Fayl va Log bo'limi -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Serverga fayl yuklash -->
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg flex flex-col justify-between">
                <div>
                    <h2 class="text-lg font-semibold mb-3 text-slate-300">Serverga fayl yuklash</h2>
                    <div class="border-2 border-dashed border-slate-600 rounded-lg p-6 text-center bg-slate-900 hover:border-indigo-500 transition">
                        <input type="file" id="file-input" class="hidden" onchange="uploadFile()">
                        <label for="file-input" class="cursor-pointer text-indigo-400 hover:underline block font-medium">Faylni tanlash</label>
                        <p id="file-status" class="text-xs text-slate-400 mt-2">Hozircha fayl yuklanmadi</p>
                    </div>
                </div>
            </div>

            <!-- Tizim Loglari -->
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg">
                <h2 class="text-lg font-semibold mb-3 text-slate-300">Tizim Loglari (Harakatlar)</h2>
                <div id="log-box" class="bg-slate-900 p-3 rounded-lg h-32 overflow-y-auto text-xs font-mono text-emerald-400 space-y-1 border border-slate-800">
                    <p class="text-slate-500">[Tizim] Boshqaruv paneli yuklandi.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;

        function checkLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if(u === 'shadows' && p === 'shadows1209') {
                localStorage.setItem('isLogged', 'true');
                showPanel();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        function showPanel() {
            document.getElementById('login-box').classList.add('hidden');
            document.getElementById('main-panel').classList.remove('hidden');
            loadStollar();
        }

        function logout() {
            localStorage.removeItem('isLogged');
            window.location.reload();
        }

        function loadStollar() {
            fetch(`${API_URL}/api/stollar`)
                .then(res => res.json())
                .then(data => {
                    const container = document.getElementById('stollar-container');
                    container.innerHTML = '';
                    data.stollar.forEach((status, index) => {
                        const btn = document.createElement('button');
                        btn.innerText = index + 1;
                        btn.className = `p-2.5 text-xs font-bold rounded-lg transition transform active:scale-95 ${status ? 'bg-red-500 hover:bg-red-600 text-white shadow-md shadow-red-900/50' : 'bg-emerald-600 hover:bg-emerald-500 text-white shadow-md shadow-emerald-900/50'}`;
                        btn.onclick = () => toggleStol(index + 1, !status);
                        container.appendChild(btn);
                    });
                }).catch(err => console.error("Xatolik:", err));
        }

        function toggleStol(id, status) {
            fetch(`${API_URL}/api/buyruq`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ stolRaqami: id, holat: status })
            }).then(() => {
                loadStollar();
                addLog(`Stol ${id} holati o'zgartirildi (${status ? 'Band' : 'Bo'sh'}).`);
            });
        }

        function addLog(text) {
            const box = document.getElementById('log-box');
            box.innerHTML += `<p>[${new Date().toLocaleTimeString()}] ${text}</p>`;
            box.scrollTop = box.scrollHeight;
        }

        function uploadFile() {
            const input = document.getElementById('file-input');
            if(input.files.length > 0) {
                const fileName = input.files[0].name;
                document.getElementById('file-status').innerText = `Yuklanmoqda: ${fileName}...`;
                setTimeout(() => {
                    document.getElementById('file-status').innerText = `Muvaffaqiyatli yuklandi: ${fileName}`;
                    addLog(`Fayl serverga yuklandi: ${fileName}`);
                }, 1500);
            }
        }

        if(localStorage.getItem('isLogged') === 'true') showPanel();
    </script>
</body>
</html>
